{% extends "base.html" %}
{% block title %}Complete Your Profile - JHE Haul{% endblock %}
{% block content %}

<div class="card" style="max-width:560px;margin:0 auto;">
    <h2 style="margin-bottom:4px;">Welcome, Hauler! 🚛</h2>
    <p style="color:#718096;margin-bottom:20px;font-size:0.92rem;">A few details so we can match you with jobs in your area.</p>
    <hr>

    <form method="POST" action="{{ url_for('hauler_setup_save') }}">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
            <div class="form-group">
                <label>First Name</label>
                <input name="first_name" required
                       value="{{ current_user.first_name or '' }}"
                       placeholder="Your first name">
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input name="last_name" required
                       value="{{ current_user.last_name or '' }}"
                       placeholder="Your last name">
            </div>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input name="phone" type="tel" placeholder="(555) 555-5555" maxlength="14"
                   oninput="maskPhone(this)"
                   value="{{ current_user.phone_formatted if current_user.phone else '' }}">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
            <div class="form-group">
                <label>Your Home ZIP Code</label>
                <input name="home_zip" required placeholder="55401" maxlength="5"
                       pattern="\d{5}" inputmode="numeric"
                       oninput="this.value=this.value.replace(/\D/g,'').slice(0,5)">
                <small>Used to find nearby jobs</small>
            </div>
            <div class="form-group">
                <label>Max Drive Distance (miles)</label>
                <input name="max_travel_miles" type="number" min="1" max="500" required placeholder="e.g. 25">
                <small>Only see jobs within this range</small>
            </div>
        </div>

        <div class="form-group">
            <label class="check-label">
                <input type="checkbox" name="notify_new_jobs" value="1" checked>
                <span>Email me when new jobs are posted in my area</span>
            </label>
        </div>
        <div class="form-group">
            <label class="check-label">
                <input type="checkbox" name="notify_sms" value="1">
                <span>Also send me text message notifications (requires phone number)</span>
            </label>
        </div>

        <button type="submit" class="btn btn-success btn-lg btn-block" style="margin-top:6px;">
            Start Finding Jobs →
        </button>
    </form>
</div>

<script>
function maskPhone(input) {
    var x = input.value.replace(/\D/g, '').slice(0, 10);
    if (x.length === 0) { input.value = ''; return; }
    if (x.length <= 3) { input.value = '(' + x; }
    else if (x.length <= 6) { input.value = '(' + x.slice(0,3) + ') ' + x.slice(3); }
    else { input.value = '(' + x.slice(0,3) + ') ' + x.slice(3,6) + '-' + x.slice(6); }
}
</script>
{% endblock %}
