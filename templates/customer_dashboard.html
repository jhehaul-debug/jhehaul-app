<!DOCTYPE html>
<html>
<head>
  <title>Customer Dashboard - JHE Haul</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; padding-top:70px; }
    .card { background:#1e293b; padding:28px; border-radius:14px; width:92%; max-width:560px; margin:auto; box-shadow:0 0 20px rgba(0,0,0,.4); }
    h1 { color:#22c55e; margin-bottom:8px; }
    p { color:#cbd5e1; }
    a { color:#22c55e; text-decoration:none; font-weight:bold; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Customer Dashboard</h1>
    <div style="margin-top:20px;">

    <a href="{{ url_for('customer_new') }}" 
     style="display:inline-block;
            background:#2ecc71;
            color:white;
            padding:12px 18px;
            border-radius:6px;
            text-decoration:none;
            font-weight:bold;">
    Post a Job
    </a>

    <a href="{{ url_for('customer_jobs') }}" 
     style="display:inline-block;
            margin-left:10px;
            background:#3498db;
            color:white;
            padding:12px 18px;
            border-radius:6px;
            text-decoration:none;
            font-weight:bold;">
    My Jobs
    </a>

    </div>
    <p><a href="/marketplace">← Back to Marketplace</a></p>
  </div>
</body>
</html>
