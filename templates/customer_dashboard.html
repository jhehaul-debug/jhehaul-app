{% extends "base.html" %}
{% block title %}Dashboard - JHE Haul{% endblock %}
{% block content %}

<div class="page-header">
    <h2 class="page-title">Customer Dashboard</h2>
    <a href="{{ url_for('customer_new') }}" class="btn btn-primary">+ Post a Job</a>
</div>

<div class="quick-actions">
    <a href="{{ url_for('customer_new') }}" class="btn btn-success btn-lg">📋 Post a New Job</a>
    <a href="{{ url_for('customer_jobs') }}" class="btn btn-outline btn-lg">📦 My Jobs</a>
</div>

<div class="card" style="text-align:center; padding: 40px 24px;">
    <div class="empty-icon">🚛</div>
    <p style="color:#718096; margin-bottom: 18px;">Ready to get your junk hauled? Post a job and haulers in your area will send you bids.</p>
    <a href="{{ url_for('customer_new') }}" class="btn btn-primary btn-lg">Post Your First Job</a>
</div>

{% endblock %}
