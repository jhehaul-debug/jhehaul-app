{% extends "base.html" %}
{% block title %}Welcome to JHE Haul{% endblock %}
{% block content %}

<div style="max-width:480px;margin:0 auto;">
    <div class="card" style="text-align:center;padding:40px 32px;">
        <div style="font-size:3rem;margin-bottom:14px;">🚛</div>
        <h2 style="margin-bottom:8px;">Welcome to JHE Haul!</h2>
        <p style="color:#718096;margin-bottom:28px;">
            Request junk removal, furniture pickup, cleanouts, and more.<br>
            Click below to set up your account and get started.
        </p>
        <form method="POST" action="{{ url_for('set_role') }}">
            <input type="hidden" name="role" value="customer">
            <button type="submit" class="btn btn-primary btn-lg btn-block">
                Get Started — Request a Service 📦
            </button>
        </form>
        <p style="margin-top:20px;color:#a0aec0;font-size:0.85rem;">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color:#3182ce;">Sign in</a>
        </p>
    </div>
</div>

{% endblock %}
