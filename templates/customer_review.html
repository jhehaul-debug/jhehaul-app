{% extends "base.html" %}
{% block title %}Review Hauler - JHE Haul{% endblock %}
{% block content %}

<a href="{{ url_for('customer_job_detail', job_id=job.id) }}" class="back-link">← Back to Job Details</a>

<div class="card" style="max-width:520px;margin:0 auto;">
    <h2 style="margin-bottom:4px;">Leave a Review</h2>
    <p style="color:#718096;margin-bottom:20px;font-size:0.92rem;">Job #{{ job.id }} — {{ job.accepted_hauler }}</p>
    <hr>
    <div style="display:flex;justify-content:space-between;margin-bottom:18px;font-size:0.92rem;color:#4a5568;">
        <span><strong>Hauler:</strong> {{ job.accepted_hauler }}</span>
        <span><strong>Quote:</strong> ${{ "%.2f"|format(job.accepted_quote or 0) }}</span>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>Rating</label>
            <select name="rating" required>
                <option value="5">⭐⭐⭐⭐⭐ — 5 Stars (Excellent)</option>
                <option value="4">⭐⭐⭐⭐ — 4 Stars (Very Good)</option>
                <option value="3">⭐⭐⭐ — 3 Stars (Good)</option>
                <option value="2">⭐⭐ — 2 Stars (Fair)</option>
                <option value="1">⭐ — 1 Star (Poor)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Comments <span style="font-weight:400;color:#a0aec0;">(optional)</span></label>
            <textarea name="comment" placeholder="Share your experience with this hauler..."></textarea>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button type="submit" class="btn btn-success">Submit Review</button>
            <a href="{{ url_for('customer_job_detail', job_id=job.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
