{% extends "base.html" %}
{% block title %}Request Service - JHE Haul{% endblock %}
{% block content %}


<div class="card" style="max-width:640px;margin:0 auto;">
    <h2 style="margin-bottom:4px;">Request Service</h2>
    <p style="color:#718096;margin-bottom:20px;font-size:0.92rem;">Fill in the details below and we'll send you a quote within 24 hours.</p>
    <hr>

    <form method="POST" action="{{ url_for('customer_create') }}" enctype="multipart/form-data"
          onsubmit="return validateCustomerForm(this);">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
            <div class="form-group">
                <label>Your Name</label>
                <input name="customer_name" required
                       value="{{ current_user.first_name or '' }} {{ current_user.last_name or '' }}"
                       placeholder="Full name">
            </div>
            <div class="form-group">
                <label>Your Phone (optional)</label>
                <input name="customer_phone" type="tel" placeholder="(555) 555-5555"
                       maxlength="14" oninput="maskPhone(this)">
            </div>
        </div>

        <div class="form-group">
            <label>Pickup Address</label>
            <input name="pickup_address" required placeholder="Street Address, City, State">
        </div>

        <div class="form-group" style="max-width:200px;">
            <label>Pickup ZIP Code</label>
            <input name="pickup_zip" required placeholder="55401" maxlength="5"
                   pattern="\d{5}" inputmode="numeric"
                   oninput="this.value=this.value.replace(/\D/g,'').slice(0,5)">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
            <div class="form-group">
                <label>Preferred Pickup Date <span style="font-weight:400;color:#a0aec0;">(optional)</span></label>
                <input type="date" name="preferred_date">
            </div>
            <div class="form-group">
                <label>Preferred Time <span style="font-weight:400;color:#a0aec0;">(optional)</span></label>
                <select name="preferred_time">
                    <option value="">Any time</option>
                    <option value="morning">Morning (8am – 12pm)</option>
                    <option value="afternoon">Afternoon (12pm – 5pm)</option>
                    <option value="evening">Evening (5pm – 8pm)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>What needs to be hauled?</label>
            <textarea name="job_description" required
                      placeholder="Describe the items, quantity, size, and any special considerations..."></textarea>
        </div>

        <div class="form-group">
            <label>Upload Photos <span style="font-weight:400;color:#a0aec0;">(optional)</span></label>
            <input type="file" name="photos" multiple accept="image/*"
                   style="background:white;padding:8px;">
        </div>

        <div class="terms-box">
            <label class="check-label">
                <input type="checkbox" name="agree_terms" value="1" required id="customerTermsCheckbox">
                <span>I certify I own or have legal authority over the property and authorize removal of all items. I understand removed items cannot be returned and this forms a legally binding agreement.
                <a href="{{ url_for('customer_terms') }}" target="_blank" style="color:#3498db;">Read Full Terms</a></span>
            </label>
        </div>

        <button type="submit" class="btn btn-success btn-lg btn-block">Submit Job</button>
    </form>
</div>

<script>
function maskPhone(input) {
    var x = input.value.replace(/\D/g, '').slice(0, 10);
    if (x.length === 0) { input.value = ''; return; }
    if (x.length <= 3) { input.value = '(' + x; }
    else if (x.length <= 6) { input.value = '(' + x.slice(0,3) + ') ' + x.slice(3); }
    else { input.value = '(' + x.slice(0,3) + ') ' + x.slice(3,6) + '-' + x.slice(6); }
}
function validateCustomerForm(form) {
    var checkbox = form.querySelector('input[name="agree_terms"]');
    if (!checkbox.checked) {
        alert('You must certify that you own or have legal authority over the property before posting a job.');
        return false;
    }
    var zip = form.querySelector('input[name="pickup_zip"]').value;
    if (!/^\d{5}$/.test(zip)) {
        alert('Please enter a valid 5-digit ZIP code.');
        return false;
    }
    return true;
}
</script>
{% endblock %}
